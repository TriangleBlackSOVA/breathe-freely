            if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0 };
            return {
                days: Math.floor(diff / 86400000),
                hours: Math.floor((diff / 3600000) % 24),
                minutes: Math.floor((diff / 60000) % 60),
                seconds: Math.floor((diff / 1000) % 60),
            };
        };

        const formatNumber = (num) => num.toString().padStart(2, '0');

          if (seconds < 3600) return `${Math.floor(seconds / 60)} мин.`;
          if (seconds < 86400) return `${Math.floor(seconds / 3600)} ч. ${Math.floor((seconds % 3600) / 60)} м.`;

        const Statistics = ({ userSettings, onUpdateSettings }) => {
          const [activeSubTab, setActiveSubTab] = useState('finance'); 
          const [localConfigs, setLocalConfigs] = useState(userSettings.statsConfig || {});
          const [isEditing, setIsEditing] = useState(false);

          const activeHabitsKeys = [
            ...(userSettings.types || []),
            ...(userSettings.alcoholEnabled ? ['alcohol'] : []),
            ...(userSettings.drugsEnabled ? ['drugs'] : [])
          ];

          const getHabitLabel = (id) => {
            if (id === 'alcohol') return 'Алкоголь';
            if (id === 'drugs') return 'ПАВ / Наркотики';
            return SMOKING_TYPES.find(t => t.id === id)?.label || id;
          };
          const isUnitsBased = (id) => SMOKING_TYPES.find(t => t.id === id)?.hasUnits;

          const handleSaveStats = () => { onUpdateSettings({ ...userSettings, statsConfig: localConfigs }); setIsEditing(false); };
          const updateConfig = (habitId, field, value) => { setLocalConfigs(prev => ({ ...prev, [habitId]: { ...prev[habitId], [field]: value } })); };

          const calcDaysElapsed = (quitDateIso) => quitDateIso ? Math.max(0, (+new Date() - +new Date(quitDateIso)) / 1000 / 86400) : 0;
          let totalSavedMoney = 0; let totalAvoidedUnits = 0; let totalLifeMinsRegained = 0;

          activeHabitsKeys.forEach(habit => {
            const conf = userSettings.statsConfig?.[habit];
            if (!conf) return;
            let startDate = userSettings.quitDate;
            if (habit === 'alcohol') startDate = userSettings.alcoholQuitDate;
            if (habit === 'drugs') startDate = userSettings.drugsQuitDate;
            const days = calcDaysElapsed(startDate);
            if (conf.type === 'units') {
              const avoided = Math.floor(days * (Number(conf.unitsPerDay) || 0));
              totalAvoidedUnits += avoided;
              totalSavedMoney += avoided * ((Number(conf.pricePerPack) || 0) / 20);
              if (['cigarettes', 'iqos'].includes(habit)) totalLifeMinsRegained += avoided * 11;
            } else {
              const spend = Number(conf.spend) || 0;
              let costPerDay = conf.period === 'day' ? spend : conf.period === 'week' ? spend / 7 : spend / 30;
              totalSavedMoney += days * costPerDay;
            }
          });

          const formatHrsMins = (totalMins) => {
            const hrs = Math.floor(totalMins / 60); const d = Math.floor(hrs / 24);
            if (d > 0) return `${d} дн. ${hrs % 24} ч.`;
            if (hrs > 0) return `${hrs} ч. ${totalMins % 60} мин.`;
            return `${totalMins} мин.`;
          };

          const historyObj = userSettings.relapseHistory || { smoking: [], alcohol: [], drugs: [] };
          const allRelapses = [...historyObj.smoking, ...historyObj.alcohol, ...historyObj.drugs].sort((a,b) => new Date(b.date) - new Date(a.date));
          const totalRelapses = allRelapses.length;
          const avgStreak = totalRelapses > 0 ? (allRelapses.reduce((sum, r) => sum + r.streakSecs, 0) / totalRelapses) : 0;
          const maxStreak = totalRelapses > 0 ? Math.max(...allRelapses.map(r => r.streakSecs)) : 0;

          return (
            <div className="space-y-6 pb-32 pt-8 px-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
              <header className="mb-6"><h1 className="text-3xl font-bold text-white tracking-tight">Аналитика</h1></header>
              <div className="flex bg-white/5 rounded-2xl p-1 border border-white/5">
                <button onClick={() => setActiveSubTab('finance')} className={`flex-1 flex justify-center items-center py-2.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeSubTab === 'finance' ? 'bg-[#2C2C2E] shadow-sm text-white' : 'text-white/50'}`}>
                  <Wallet size={16} className="mr-2" /> Экономика
                </button>
                <button onClick={() => setActiveSubTab('relapses')} className={`flex-1 flex justify-center items-center py-2.5 rounded-xl text-sm font-bold transition-all duration-300 ${activeSubTab === 'relapses' ? 'bg-[#2C2C2E] shadow-sm text-white' : 'text-white/50'}`}>
                  <RotateCcw size={16} className="mr-2" /> Срывы
                </button>
              </div>

              {activeSubTab === 'finance' && (
                <div className="animate-in slide-in-from-left-4 fade-in duration-300">
                  {!isEditing ? (
                    <>
                      <div className="flex justify-between items-center mb-4">
                        <h3 className="font-bold text-white">Твои ресурсы</h3>
                        <button onClick={() => setIsEditing(true)} className="text-blue-500 font-bold text-xs bg-blue-500/10 px-3 py-1.5 rounded-lg">Изменить</button>
                      </div>
                      <div className="grid grid-cols-2 gap-4">
                        <div className="col-span-2 bg-gradient-to-br from-green-400 to-emerald-600 rounded-[28px] p-6 text-white shadow-lg shadow-green-500/20 relative overflow-hidden">
                          <div className="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                          <div className="flex items-center space-x-3 mb-4"><div className="bg-white/20 p-2 rounded-xl"><Wallet size={24} /></div><span className="font-bold text-white/90">Сэкономлено</span></div>
                          <div className="text-4xl font-black tracking-tight">{Math.floor(totalSavedMoney).toLocaleString('ru-RU')} ₽</div>
                          <p className="text-white/70 text-xs mt-2 font-medium">Суммарно со всех трекеров</p>
                        </div>
                        {totalAvoidedUnits > 0 && (
                          <div className="bg-[#1C1C1E] rounded-[28px] p-5 border border-white/5 shadow-sm">
                            <div className="bg-blue-500/10 w-10 h-10 rounded-xl flex items-center justify-center text-blue-500 mb-3"><Wind size={20}/></div>
                            <div className="text-2xl font-black text-white">{totalAvoidedUnits.toLocaleString('ru-RU')}</div>
                            <p className="text-white/50 text-xs font-medium leading-tight mt-1">Невыкуренных<br/>штук</p>
                          </div>
                        )}
                        {totalAvoidedUnits > 0 && (
                          <div className="bg-[#1C1C1E] rounded-[28px] p-5 border border-white/5 shadow-sm">
                            <div className="bg-orange-500/10 w-10 h-10 rounded-xl flex items-center justify-center text-orange-500 mb-3"><Clock size={20}/></div>
                            <div className="text-2xl font-black text-white">{formatHrsMins(totalAvoidedUnits * 5)}</div>
                            <p className="text-white/50 text-xs font-medium leading-tight mt-1">Свободного<br/>времени</p>
                          </div>
                        )}
                        {totalLifeMinsRegained > 0 && (
                          <div className="col-span-2 bg-[#1C1C1E] rounded-[28px] p-6 border border-white/5 shadow-sm flex items-center">
                            <div className="bg-rose-500/10 p-4 rounded-2xl text-rose-500 mr-4"><LifeBuoy size={28}/></div>
                            <div>
                              <p className="text-white/50 text-[10px] font-bold uppercase tracking-wider mb-1">Возвращено жизни (на базе сигарет)</p>
                              <div className="text-xl font-black text-white">{formatHrsMins(totalLifeMinsRegained)}</div>
                            </div>
                          </div>
                        )}
                      </div>
                    </>
                  ) : (
                    <div className="bg-[#1C1C1E] rounded-[28px] p-6 shadow-sm border border-white/5 mb-6">
                      <h3 className="font-bold text-white mb-6 text-lg">Настройка трат</h3>
                      <div className="space-y-6">
                        {activeHabitsKeys.map(habit => {
                          const conf = localConfigs[habit] || { type: 'budget', spend: 0, period: 'week' };
                          return (
                            <div key={habit} className="pb-6 border-b border-white/5 last:border-0 last:pb-0">
                              <div className="font-bold text-sm text-white mb-3 flex items-center"><div className="w-2 h-2 rounded-full bg-blue-500 mr-2"></div>{getHabitLabel(habit)}</div>
                              {isUnitsBased(habit) ? (
                                <div className="grid grid-cols-2 gap-3">
                                  <div>
                                    <label className="block text-[10px] font-bold text-white/50 uppercase mb-1">Штук в день</label>
                                    <input type="number" value={conf.unitsPerDay || ''} onChange={(e) => updateConfig(habit, 'unitsPerDay', e.target.value)} className="w-full bg-white/5 text-white p-3 rounded-xl outline-none" placeholder="15" />
                                  </div>
                                  <div>
                                    <label className="block text-[10px] font-bold text-white/50 uppercase mb-1">Цена за 20 шт (₽)</label>
                                    <input type="number" value={conf.pricePerPack || ''} onChange={(e) => updateConfig(habit, 'pricePerPack', e.target.value)} className="w-full bg-white/5 text-white p-3 rounded-xl outline-none" placeholder="200" />
                                  </div>
                                </div>
                              ) : (
                                <div className="grid grid-cols-2 gap-3">
                                  <div>
                                    <label className="block text-[10px] font-bold text-white/50 uppercase mb-1">Сумма трат (₽)</label>
                                    <input type="number" value={conf.spend || ''} onChange={(e) => updateConfig(habit, 'spend', e.target.value)} className="w-full bg-white/5 text-white p-3 rounded-xl outline-none" placeholder="1000" />
                                  </div>
                                  <div>
                                    <label className="block text-[10px] font-bold text-white/50 uppercase mb-1">Период</label>
                                    <select value={conf.period || 'week'} onChange={(e) => updateConfig(habit, 'period', e.target.value)} className="w-full bg-white/5 text-white p-3 rounded-xl outline-none appearance-none">
                                      <option value="day">В день</option><option value="week">В неделю</option><option value="month">В месяц</option>
                                    </select>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })}
                        <button onClick={handleSaveStats} className="w-full bg-blue-500 text-white font-bold py-4 rounded-xl active:scale-95 transition-transform mt-4">Сохранить настройки</button>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {activeSubTab === 'relapses' && (
                <div className="animate-in slide-in-from-right-4 fade-in duration-300">
                  <div className="grid grid-cols-2 gap-4 mb-6">
                    <div className="bg-[#1C1C1E] rounded-[24px] p-5 shadow-sm border border-white/5 flex flex-col items-center justify-center">
                      <span className="text-3xl font-black text-rose-500">{totalRelapses}</span>
                      <span className="text-[10px] font-bold text-white/50 uppercase tracking-wider mt-1">Всего срывов</span>
                    </div>
                    <div className="bg-[#1C1C1E] rounded-[24px] p-5 shadow-sm border border-white/5 flex flex-col items-center justify-center text-center">
                      <span className="text-xl font-black text-blue-500">{avgStreak > 0 ? formatDurationFriendly(avgStreak) : '—'}</span>
                      <span className="text-[10px] font-bold text-white/50 uppercase tracking-wider mt-1">Средняя чистота</span>
                    </div>
                  </div>
                  <h3 className="font-bold text-white mb-4 flex items-center"><CalendarDays size={18} className="mr-2 text-white/50" />История попыток</h3>
                  {totalRelapses === 0 ? (
                    <div className="bg-white/5 rounded-2xl p-8 text-center border border-dashed border-white/10">
                      <ListRestart size={32} className="mx-auto text-white/30 mb-3" />
                      <p className="text-sm font-bold text-white/60">Нет записей о срывах</p>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {allRelapses.map((rel, idx) => {
                        const date = new Date(rel.date);
                        const isMax = rel.streakSecs === maxStreak && maxStreak > 0;
                        return (
                          <div key={idx} className="bg-[#1C1C1E] rounded-2xl p-4 shadow-sm border border-white/5 flex justify-between items-center relative overflow-hidden">
                            {isMax && <div className="absolute left-0 top-0 bottom-0 w-1 bg-yellow-400"></div>}
                            <div>
                              <div className="text-xs font-bold text-white/40 mb-1">{date.toLocaleDateString('ru-RU')} в {date.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'})}</div>
                              <div className="font-bold text-white text-sm">Продержался: <span className={isMax ? 'text-yellow-500' : 'text-blue-500'}>{formatDurationFriendly(rel.streakSecs)}</span></div>
                            </div>
                            {isMax && <Trophy size={18} className="text-yellow-400 shrink-0" />}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        };

        const Practices = () => {
          const [isBreathing, setIsBreathing] = useState(false);
          const [breathPhase, setBreathPhase] = useState('Вдох'); 
          const [breathScale, setBreathScale] = useState(1);
          const [activePracticeModal, setActivePracticeModal] = useState(null);
          const [modalTimer, setModalTimer] = useState(60);
          const [isModalTimerRunning, setIsModalTimerRunning] = useState(false);

          useEffect(() => {
            let interval, timeout1, timeout2;
            if (isBreathing) {
              const cycle = () => {
                setBreathPhase('Вдох (4 сек)'); setBreathScale(1.5);
                timeout1 = setTimeout(() => {
                  setBreathPhase('Удерживай (7 сек)'); setBreathScale(1.5);
                  timeout2 = setTimeout(() => { setBreathPhase('Выдох (8 сек)'); setBreathScale(1); }, 7000); 
                }, 4000); 
              };
              cycle();
              interval = setInterval(cycle, 19000); 
            } else {
              setBreathScale(1); setBreathPhase('Начать');
            }
            return () => { clearInterval(interval); clearTimeout(timeout1); clearTimeout(timeout2); };
          }, [isBreathing]);

          useEffect(() => {
            let int;
            if (isModalTimerRunning && modalTimer > 0) int = setInterval(() => setModalTimer(v => v - 1), 1000);
            else if (modalTimer === 0) setIsModalTimerRunning(false);
            return () => clearInterval(int);
          }, [isModalTimerRunning, modalTimer]);

          useEffect(() => {
            if (activePracticeModal) { setModalTimer(60); setIsModalTimerRunning(false); }
          }, [activePracticeModal]);

          return (
            <div className="space-y-6 pb-32 pt-8 px-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
              <header className="mb-6"><h1 className="text-3xl font-bold text-white tracking-tight">Практики</h1></header>

              <div className="bg-[#1C1C1E] rounded-[28px] p-8 shadow-sm border border-white/5 flex flex-col items-center py-12 relative overflow-hidden">
                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-teal-400/20 blur-[50px] rounded-full pointer-events-none"></div>
                <h3 className="text-lg font-bold text-white mb-10 z-10">Осознанное дыхание</h3>
                <div className="relative w-48 h-48 flex items-center justify-center mb-10 z-10">
                  <div className="absolute w-32 h-32 bg-teal-400/20 rounded-full transition-all ease-in-out" style={{ transform: `scale(${breathScale})`, transitionDuration: breathPhase.includes('Вдох') ? '4s' : breathPhase.includes('Выдох') ? '8s' : '0.5s' }}></div>
                  <div className="absolute w-24 h-24 bg-teal-400/40 rounded-full transition-all ease-in-out delay-75" style={{ transform: `scale(${breathScale})`, transitionDuration: breathPhase.includes('Вдох') ? '4s' : breathPhase.includes('Выдох') ? '8s' : '0.5s' }}></div>
                  <div className="absolute w-16 h-16 bg-teal-500 rounded-full flex items-center justify-center text-white shadow-lg shadow-teal-500/40 z-10">
                    {isBreathing ? <Square fill="currentColor" size={20} /> : <Play fill="currentColor" size={24} className="ml-1" />}
                  </div>
                </div>
                <p className="text-teal-400 font-bold text-lg mb-6 h-6">{isBreathing ? breathPhase : ' '}</p>
                <button onClick={() => setIsBreathing(!isBreathing)} className={`px-8 py-3 rounded-full font-bold transition-all active:scale-95 z-10 ${isBreathing ? 'bg-white/10 text-white' : 'bg-white text-black shadow-md'}`}>
                  {isBreathing ? 'Остановить' : 'Начать сессию'}
                </button>
              </div>

              <h3 className="text-xl font-bold text-white tracking-tight mt-10 mb-4 px-2">Каталог техник</h3>
              <div className="space-y-3">
                {PRACTICES.map((practice, idx) => (
                  <button key={idx} onClick={() => setActivePracticeModal(practice)} className="w-full text-left bg-[#1C1C1E] rounded-2xl p-4 shadow-sm border border-white/5 flex items-start space-x-4 hover:bg-white/10 active:scale-[0.98] transition-all duration-200">
                    <div className="bg-blue-500/10 p-3 rounded-xl text-blue-500 shrink-0">{practice.icon}</div>
                    <div>
                      <h4 className="font-bold text-white text-sm mb-1">{practice.title}</h4>
                      <p className="text-white/60 text-xs leading-relaxed line-clamp-2">{practice.description}</p>
                    </div>
                  </button>
                ))}
              </div>

              {activePracticeModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 backdrop-blur-xl animate-in fade-in duration-300">
                  <div className="bg-[#1C1C1E] backdrop-blur-2xl rounded-[32px] p-8 max-w-sm w-full shadow-2xl relative border border-white/20 animate-in zoom-in-95 duration-300 max-h-[90vh] overflow-y-auto hide-scrollbar">
                    <button onClick={() => setActivePracticeModal(null)} className="absolute top-5 right-5 bg-white/10 p-2 rounded-full text-white/50 hover:bg-white/20 z-10"><X size={20} /></button>
                    <div className="w-16 h-16 bg-blue-500 text-white rounded-2xl flex items-center justify-center mb-6 shadow-lg shadow-blue-500/30">{activePracticeModal.icon}</div>
                    <p className="text-blue-400 font-bold text-sm uppercase tracking-wider mb-2">Фокус-задание</p>
                    <h3 className="text-2xl font-bold text-white tracking-tight mb-3">{activePracticeModal.title}</h3>
                    <p className="text-white/70 leading-relaxed font-medium">{activePracticeModal.description}</p>
                    <div className="flex flex-col items-center justify-center my-8">
                      <div className="relative w-28 h-28 flex items-center justify-center mb-5">
                        <svg className="absolute inset-0 w-full h-full transform -rotate-90">
                          <circle cx="56" cy="56" r="52" stroke="currentColor" strokeWidth="6" fill="none" className="text-white/5" />
                          <circle cx="56" cy="56" r="52" stroke="currentColor" strokeWidth="6" fill="none" strokeDasharray="326" strokeDashoffset={326 - (326 * modalTimer) / 60} className={`${modalTimer === 0 ? 'text-green-500' : 'text-blue-500'} transition-all duration-1000 ease-linear`} strokeLinecap="round" />
                        </svg>
                        <span className={`text-3xl font-bold ${modalTimer === 0 ? 'text-green-500' : 'text-white'}`}>
                          {modalTimer === 0 ? <CheckCircle2 size={36} /> : modalTimer}
                        </span>
                      </div>
                      <button onClick={() => modalTimer === 0 ? setModalTimer(60) : setIsModalTimerRunning(!isModalTimerRunning)} className={`w-full font-bold py-4 rounded-2xl active:scale-[0.98] transition-all ${modalTimer === 0 ? 'bg-green-500/10 text-green-400' : isModalTimerRunning ? 'bg-white/10 text-white' : 'bg-blue-500 text-white shadow-lg shadow-blue-500/30'}`}>
                        {modalTimer === 0 ? 'Повторить практику' : isModalTimerRunning ? 'Пауза' : 'Начать выполнение (60 сек)'}
                      </button>
                    </div>
                    <button onClick={() => setActivePracticeModal(null)} className="w-full bg-transparent text-white/50 font-bold py-2 hover:text-white transition-colors">Закрыть</button>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const AchievementsBoard = ({ userSettings }) => {
          const [elapsedSeconds, setElapsedSeconds] = useState(0);

          useEffect(() => {
            const calc = () => { if (userSettings?.quitDate) setElapsedSeconds(Math.max(0, (+new Date() - +new Date(userSettings.quitDate)) / 1000)); };
            calc(); const interval = setInterval(calc, 1000); return () => clearInterval(interval);
          }, [userSettings.quitDate]);

          return (
            <div className="space-y-6 pb-32 pt-8 px-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
              <header className="mb-6"><h1 className="text-3xl font-bold text-white tracking-tight">Достижения</h1><p className="text-white/50 text-sm font-medium mt-1">То, что ты потеряешь при срыве</p></header>
              <div className="space-y-4">
                {ACHIEVEMENTS.map((ach) => {
                  const isUnlocked = elapsedSeconds >= ach.thresholdSec;
                  const progress = Math.min(100, (elapsedSeconds / ach.thresholdSec) * 100);
                  return (
                    <div key={ach.id} className={`relative overflow-hidden rounded-[28px] p-5 border transition-all duration-300 ${isUnlocked ? 'bg-[#1C1C1E] border-blue-500/30 shadow-lg shadow-blue-500/10' : 'bg-white/5 border-white/5'}`}>
                      {isUnlocked && <div className="absolute top-0 right-0 w-32 h-32 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>}
                      <div className="flex items-start space-x-4 relative z-10">
                        <div className={`p-3 rounded-2xl shrink-0 transition-colors duration-500 ${isUnlocked ? 'bg-gradient-to-br from-blue-500 to-indigo-500 text-white shadow-md' : 'bg-white/10 text-white/40'}`}>{ach.icon}</div>
                        <div className="flex-1">
                          <div className="flex justify-between items-start mb-1">
                            <h4 className={`font-bold text-sm leading-tight ${isUnlocked ? 'text-white' : 'text-white/60'}`}>{ach.title}</h4>
                            {isUnlocked && <CheckCircle2 size={18} className="text-blue-500 ml-2 shrink-0 animate-in zoom-in" />}
                          </div>
                          <p className={`text-xs leading-relaxed mb-3 ${isUnlocked ? 'text-white/70' : 'text-white/40'}`}>{ach.description}</p>
                          {!isUnlocked && (
                            <div className="mt-2">
                              <div className="flex justify-between text-[10px] font-bold text-white/40 mb-1 uppercase tracking-wider"><span>Прогресс</span><span>{progress.toFixed(1)}%</span></div>
                              <div className="w-full bg-white/10 rounded-full h-1.5 overflow-hidden"><div className="bg-blue-500 h-full rounded-full transition-all duration-1000 ease-out" style={{ width: `${progress}%` }}></div></div>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        };

        const Settings = ({ userSettings, onUpdateSettings, onShowDialog }) => {
          const updateTheme = (habit, themeId) => onUpdateSettings({ ...userSettings, timerThemes: { ...(userSettings.timerThemes || {}), [habit]: themeId } });
          const toggleWidgetSize = () => onUpdateSettings({ ...userSettings, widgetSize: userSettings.widgetSize === 'compact' ? 'large' : 'compact' });

          const requestReset = (type) => {
            if (type === 'all') {
              onShowDialog({
                title: 'Удалить все данные?',
                message: 'ВНИМАНИЕ: Это полностью удалит историю срывов, статистику экономии и все таймеры.',
                type: 'confirm',
                isDanger: true,
                confirmText: 'Удалить',
                onConfirm: () => onUpdateSettings(null)
              });
              return;
            }

            onShowDialog({
              title: 'Зафиксировать срыв?',
              message: 'Мы сбросим этот таймер и сохраним результат в "Аналитику срывов", чтобы ты мог отслеживать паттерны.',
              type: 'confirm',
              isDanger: false,
              confirmText: 'Записать срыв',
              onConfirm: () => {
                const now = new Date();
                const history = userSettings.relapseHistory ? { ...userSettings.relapseHistory } : { smoking: [], alcohol: [], drugs: [] };
                const newSettings = { ...userSettings };
                const recordRelapse = (category, oldDateStr) => {
                  const streakSecs = Math.max(0, (now - new Date(oldDateStr)) / 1000);
                  if (!history[category]) history[category] = [];
                  history[category].push({ date: now.toISOString(), streakSecs });
                };
                if (type === 'smoking') { recordRelapse('smoking', userSettings.quitDate); newSettings.quitDate = now.toISOString(); }
                if (type === 'alcohol') { recordRelapse('alcohol', userSettings.alcoholQuitDate); newSettings.alcoholQuitDate = now.toISOString(); }
                if (type === 'drugs') { recordRelapse('drugs', userSettings.drugsQuitDate); newSettings.drugsQuitDate = now.toISOString(); }
                
                newSettings.relapseHistory = history;
                onUpdateSettings(newSettings, 'statistics');
              }
            });
          };

          return (
            <div className="space-y-6 pb-32 pt-8 px-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
              <header className="mb-6"><h1 className="text-3xl font-bold text-white tracking-tight">Настройки</h1></header>

              <div className="bg-[#1C1C1E] rounded-[28px] p-6 shadow-sm border border-white/5 space-y-6">
                <div className="flex items-center justify-between pt-2">
                  <div className="flex items-center space-x-4">
                    <div className="bg-blue-500/10 p-3 rounded-xl text-blue-500">{userSettings.widgetSize === 'compact' ? <Minimize2 size={20} /> : <Maximize2 size={20} />}</div>
                    <div>
                      <span className="font-bold text-white text-sm block">Размер таймеров</span>
                      <span className="text-xs text-white/50">{userSettings.widgetSize === 'compact' ? 'Компактные' : 'Большие (с секундами)'}</span>
                    </div>
                  </div>
                  <div onClick={toggleWidgetSize} className={`w-14 h-8 rounded-full transition-colors relative cursor-pointer ${userSettings.widgetSize === 'compact' ? 'bg-blue-500' : 'bg-white/20'}`}>
                    <div className={`absolute top-1 bg-white w-6 h-6 rounded-full shadow-md transition-transform duration-300 ${userSettings.widgetSize === 'compact' ? 'translate-x-7' : 'translate-x-1'}`}></div>
                  </div>
                </div>
              </div>

              <div className="bg-[#1C1C1E] rounded-[28px] p-6 shadow-sm border border-white/5">
                <h3 className="font-bold text-white mb-6 text-sm uppercase tracking-wider">Стиль таймеров</h3>
                {userSettings.types?.length > 0 && <ThemeSelector title="Курение (Темные)" themes={TIMER_THEMES.smoking} selectedId={userSettings.timerThemes?.smoking || 's1'} onSelect={(id) => updateTheme('smoking', id)} />}
                {userSettings.alcoholEnabled && <ThemeSelector title="Алкоголь (Яркие)" themes={TIMER_THEMES.alcohol} selectedId={userSettings.timerThemes?.alcohol || 'a1'} onSelect={(id) => updateTheme('alcohol', id)} />}
                {userSettings.drugsEnabled && <ThemeSelector title="Вещества (Триповые)" themes={TIMER_THEMES.drugs} selectedId={userSettings.timerThemes?.drugs || 'd1'} onSelect={(id) => updateTheme('drugs', id)} />}
              </div>

              <div className="bg-[#1C1C1E] rounded-[28px] p-6 shadow-sm border border-white/5 space-y-6">
                <div>
                  <h3 className="font-bold text-white mb-2 text-sm uppercase tracking-wider">Фиксация срыва</h3>
                  <button onClick={() => requestReset('smoking')} className="w-full bg-white/10 text-white font-bold py-4 rounded-2xl hover:bg-white/20 transition-colors active:scale-95">Срыв: Курение</button>
                </div>
                {userSettings.alcoholEnabled && <div className="pt-6 border-t border-white/10"><button onClick={() => requestReset('alcohol')} className="w-full bg-white/10 text-white font-bold py-4 rounded-2xl hover:bg-white/20 transition-colors active:scale-95">Срыв: Алкоголь</button></div>}
                {userSettings.drugsEnabled && <div className="pt-6 border-t border-white/10"><button onClick={() => requestReset('drugs')} className="w-full bg-white/10 text-white font-bold py-4 rounded-2xl hover:bg-white/20 transition-colors active:scale-95">Срыв: Вещества</button></div>}
                <div className="pt-6 border-t border-white/10"><button onClick={() => requestReset('all')} className="w-full bg-red-500/10 text-red-500 font-bold py-4 rounded-2xl hover:bg-red-500/20 transition-colors active:scale-95">Удалить все данные навсегда</button></div>
              </div>
            </div>
          );
        };

        // --- Главный компонент App ---
        const App = () => {
          const [user, setUser] = useState(null);
          const [userSettings, setUserSettings] = useState(null);
          const [isInitializing, setIsInitializing] = useState(true);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [notification, setNotification] = useState(null);
          const [dialog, setDialog] = useState(null);

          // 1. Инициализация Firebase Авторизации
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else {
                  await auth.signInAnonymously();
                }
              } catch (e) {
                console.error("Ошибка авторизации:", e);
                setIsInitializing(false);
              }
            };
            initAuth();
            const unsubscribe = auth.onAuthStateChanged((u) => {
                setUser(u);
            });
            return () => unsubscribe();
          }, []);

          // 2. Загрузка данных из облака
          useEffect(() => {
            if (!user) return;
            const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('data');
            
            const unsubscribe = docRef.onSnapshot(
                (doc) => {
                    if (doc.exists) {
                        setUserSettings(doc.data());
                    } else {
                        setUserSettings('onboarding');
                    }
                    setIsInitializing(false);
                },
                (error) => {
                    console.error("Ошибка загрузки из облака:", error);
                    setUserSettings('onboarding');
                    setIsInitializing(false);
                }
            );
            return () => unsubscribe();
          }, [user]);

          // Уведомления
          useEffect(() => {
            if (!userSettings || userSettings === 'onboarding') return;
            const interval = setInterval(() => {
              setNotification(MOTIVATIONAL_QUOTES[Math.floor(Math.random() * MOTIVATIONAL_QUOTES.length)]);
              setTimeout(() => setNotification(null), 5000); 
            }, 60000); 
            return () => clearInterval(interval);
          }, [userSettings]);

          // 3. Сохранение данных в облако
          const handleUpdateSettings = async (newSettings, redirectTab) => {
            if (!user) return;
            
            if (newSettings === null) {
                setUserSettings('onboarding');
                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('data').delete();
                } catch(e) { console.error(e) }
            } else {
                setUserSettings(newSettings);
                try {
                    await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('data').set(newSettings, { merge: true });
                } catch(e) { console.error(e) }
            }
            
            setDialog(null);
            if (redirectTab) setActiveTab(redirectTab);
          };

          const showSystemAlert = (title, message) => setDialog({ type: 'alert', title, message });

          if (isInitializing) {
             return (
                 <div className="min-h-screen bg-black flex flex-col items-center justify-center text-white">
                    <Shield className="w-16 h-16 text-blue-500 mb-6 animate-subtle-pulse" />
                    <h2 className="text-xl font-bold animate-pulse text-white/50">Загрузка данных...</h2>
                 </div>
             );
          }

          if (userSettings === 'onboarding') {
            return (
              <div className="w-full bg-black min-h-screen font-sans text-white">
                <CustomDialog dialog={dialog} onClose={() => setDialog(null)} />
                <Onboarding onComplete={handleUpdateSettings} onShowAlert={showSystemAlert} />
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-black text-white font-sans">
              <div className="w-full max-w-md mx-auto min-h-screen relative overflow-x-hidden flex flex-col shadow-2xl">
                
                <CustomDialog dialog={dialog} onClose={() => setDialog(null)} />
                
                <div className={`fixed top-8 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-sm transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] ${notification ? 'translate-y-0 opacity-100 scale-100' : '-translate-y-10 opacity-0 scale-95 pointer-events-none'}`}>
                  <div className="bg-[#2C2C2E]/80 backdrop-blur-xl text-white p-4 rounded-3xl shadow-2xl flex items-center border border-white/10">
                    <div className="bg-blue-500/20 p-2 rounded-full mr-3 shrink-0"><Bell className="w-5 h-5 text-blue-500" /></div>
                    <p className="text-sm font-semibold">{notification}</p>
                  </div>
                </div>

                <main className="flex-1 overflow-y-auto hide-scrollbar">
                  {activeTab === 'dashboard' && <Dashboard userSettings={userSettings} />}
                  {activeTab === 'statistics' && <Statistics userSettings={userSettings} onUpdateSettings={handleUpdateSettings} />}
                  {activeTab === 'practices' && <Practices />}
                  {activeTab === 'achievements' && <AchievementsBoard userSettings={userSettings} />}
                  {activeTab === 'settings' && <Settings userSettings={userSettings} onUpdateSettings={handleUpdateSettings} onShowDialog={setDialog} />}
                </main>

                <nav className="fixed bottom-0 w-full max-w-md z-40 px-4 pb-safe pt-2">
                  <div className="bg-[#1C1C1E]/80 backdrop-blur-2xl border border-white/10 rounded-[2rem] p-2 shadow-2xl mb-6">
                    <ul className="flex justify-between items-center px-1">
                      {[
                        { id: 'dashboard', icon: Activity },
                        { id: 'statistics', icon: BarChart3 },
                        { id: 'practices', icon: Heart },
                        { id: 'achievements', icon: Trophy },
                        { id: 'settings', icon: SettingsIcon }
                      ].map(tab => (
                        <li key={tab.id}>
                          <button 
                            onClick={() => setActiveTab(tab.id)}
                            className={`flex flex-col items-center p-3 px-4 rounded-2xl transition-all duration-300 ${activeTab === tab.id ? 'bg-white text-black shadow-md' : 'text-white/50 hover:bg-white/10'}`}
                          >
                            <tab.icon size={22} strokeWidth={activeTab === tab.id ? 2.5 : 2} />
                          </button>
                        </li>
                      ))}
                    </ul>
                  </div>
                </nav>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
