        // --- Вспомогательные функции ---
        const calculateTimeLeft = (startDate) => {
            if (!startDate) return null;
            const diff = +new Date() - +new Date(startDate);
            if (diff <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0 };
            return {
                days: Math.floor(diff / 86400000),
                hours: Math.floor((diff / 3600000) % 24),
                minutes: Math.floor((diff / 60000) % 60),
                seconds: Math.floor((diff / 1000) % 60),
            };
        };

        const formatNumber = (num) => num.toString().padStart(2, '0');
        const formatDurationFriendly = (seconds) => {
          if (seconds < 3600) return `${Math.floor(seconds / 60)} мин.`;
          if (seconds < 86400) return `${Math.floor(seconds / 3600)} ч.`;
          return `${Math.floor(seconds / 86400)} дн.`;
        };

                <p className="text-white/70 text-sm mb-6 leading-relaxed">{dialog.message}</p>
                <div className="flex space-x-3">
                  <button onClick={onClose} className="flex-1 bg-white/10 py-3 rounded-xl font-bold text-white">Отмена</button>
                  {dialog.type === 'confirm' && (
                    <button onClick={dialog.onConfirm} className={`flex-1 py-3 rounded-xl font-bold text-white ${dialog.isDanger ? 'bg-red-500' : 'bg-blue-500'}`}>
                      {dialog.confirmText || 'ОК'}
                    </button>

            return () => clearInterval(timer);
          }, [date]);
          if (!timeLeft) return null;
          const isCompact = size === 'compact';
          const safeTheme = theme || THEME_DEFAULTS;

            <div className={`rounded-[28px] ${isCompact ? 'p-4' : 'p-6'} shadow-xl ${safeTheme.bgClass} relative overflow-hidden mb-4 transition-all duration-500`}>
              <div className="flex justify-between items-start mb-4 relative z-10">
                <h2 className={`${isCompact ? 'text-sm' : 'text-lg'} font-bold`}>{title}</h2>
                <div className="p-2 rounded-xl bg-white/20">{icon}</div>
              </div>
              <div className="flex justify-between items-baseline px-1 relative z-10">
                {['days', 'hours', 'minutes'].map(u => (
                  <div key={u} className="flex flex-col items-center">
                    <span className={`${isCompact ? 'text-xl' : 'text-3xl'} font-bold`}>{timeLeft[u === 'days' ? 'days' : u === 'hours' ? 'hours' : 'minutes']}</span>
                    <span className="text-[9px] opacity-60 uppercase">{u}</span>
                  </div>
                ))}
              </div>
            </div>
          );
        };

        const Onboarding = ({ onComplete }) => {
            const [selectedTypes, setSelectedTypes] = useState([]);
            const [quitDate, setQuitDate] = useState(new Date().toISOString().slice(0, 16));
            const [enableAlcohol, setEnableAlcohol] = useState(false);
            const [enableDrugs, setEnableDrugs] = useState(false);

            const handleStart = () => {
                const defaultStats = {};
                selectedTypes.forEach(t => { defaultStats[t] = { type: 'units', unitsPerDay: 15, pricePerPack: 200 }; });
                if (enableAlcohol) defaultStats['alcohol'] = { type: 'budget', spend: 3000, period: 'month' };
                if (enableDrugs) defaultStats['drugs'] = { type: 'budget', spend: 5000, period: 'month' };

                onComplete({
                    types: selectedTypes,
                    quitDate: new Date(quitDate).toISOString(),
                    alcoholEnabled: enableAlcohol,
                    alcoholQuitDate: enableAlcohol ? new Date(quitDate).toISOString() : null,
                    drugsEnabled: enableDrugs,
                    drugsQuitDate: enableDrugs ? new Date(quitDate).toISOString() : null,
                    isDarkMode: true,
                    timerThemes: { smoking: 's1', alcohol: 'a1', drugs: 'd1' },
                    relapseHistory: { smoking: [], alcohol: [], drugs: [] },
                    statsConfig: defaultStats,
                    widgetSize: 'large'
                });
            };

            return (
                <div className="min-h-screen bg-black flex items-center justify-center p-6">
                    <div className="bg-[#1C1C1E] p-8 rounded-[2rem] w-full max-w-md border border-white/10">
                        <h1 className="text-3xl font-bold mb-8 text-center">Дыши Свободно</h1>
                        <div className="space-y-4">
                            {SMOKING_TYPES.map(t => (
                                <button key={t.id} onClick={() => setSelectedTypes(prev => prev.includes(t.id) ? prev.filter(x => x !== t.id) : [...prev, t.id])} 
                                    className={`w-full p-4 rounded-2xl border flex items-center transition-all ${selectedTypes.includes(t.id) ? 'border-blue-500 bg-blue-500/10' : 'border-white/10'}`}>
                                    {t.icon} <span className="ml-4">{t.label}</span>
                                </button>
                            ))}
                            <div className="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/10">
                                <span>Алкоголь</span>
                                <input type="checkbox" checked={enableAlcohol} onChange={e => setEnableAlcohol(e.target.checked)} className="w-6 h-6 rounded-full" />
                            </div>
                            <div className="flex items-center justify-between p-4 bg-white/5 rounded-2xl border border-white/10">
                                <span>ПАВ</span>
                                <input type="checkbox" checked={enableDrugs} onChange={e => setEnableDrugs(e.target.checked)} className="w-6 h-6 rounded-full" />
                            </div>
                            <input type="datetime-local" value={quitDate} onChange={e => setQuitDate(e.target.value)} className="w-full bg-white/5 p-4 rounded-2xl border border-white/10 color-scheme-dark" />
                            <button onClick={handleStart} className="w-full bg-blue-500 py-4 rounded-2xl font-bold text-lg mt-4 shadow-lg shadow-blue-500/20 active:scale-95 transition-transform">Начать новую жизнь</button>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [userSettings, setUserSettings] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [dialog, setDialog] = useState(null);

          useEffect(() => {
            const initAuth = async () => {
                try { await auth.signInAnonymously(); } catch (e) { console.error(e); }
            };
            initAuth();
            const unsubscribe = auth.onAuthStateChanged(setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const docRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('data');
            const unsubscribe = docRef.onSnapshot(doc => {
                if (doc.exists) { setUserSettings(doc.data()); } 
                else { setUserSettings('onboarding'); }
            }, err => console.error(err));
            return () => unsubscribe();
          }, [user]);

          const saveData = async (newSettings) => {
              if (!user || !newSettings || newSettings === 'onboarding') return;
              try {
                  await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('settings').doc('data').set(newSettings, { merge: true });
              } catch (e) { console.error(e); }
          };

          const handleUpdateSettings = (settings) => {
              setUserSettings(settings);
              saveData(settings);
              setDialog(null);
          };

          const requestRelapse = (type) => {
            setDialog({
                title: 'Зафиксировать срыв?',
                message: 'Таймер обнулится. Мы сохраним этот момент в статистику, чтобы ты мог проанализировать ситуацию.',
                type: 'confirm',
                confirmText: 'Записать срыв',
                isDanger: true,
                onConfirm: () => {
                    const now = new Date();
                    const history = userSettings.relapseHistory || { smoking: [], alcohol: [], drugs: [] };
                    const oldDate = type === 'smoking' ? userSettings.quitDate : type === 'alcohol' ? userSettings.alcoholQuitDate : userSettings.drugsQuitDate;
                    const streakSecs = Math.max(0, (now - new Date(oldDate)) / 1000);
                    
                    const cat = type === 'smoking' ? 'smoking' : type === 'alcohol' ? 'alcohol' : 'drugs';
                    history[cat].push({ date: now.toISOString(), streakSecs });
                    
                    const newSets = { ...userSettings, relapseHistory: history };
                    if (type === 'smoking') newSets.quitDate = now.toISOString();
                    if (type === 'alcohol') newSets.alcoholQuitDate = now.toISOString();
                    if (type === 'drugs') newSets.drugsQuitDate = now.toISOString();
                    
                    handleUpdateSettings(newSets);
                    setActiveTab('statistics');
                }
            });
          };

          if (!userSettings) return <div className="min-h-screen bg-black flex items-center justify-center">Загрузка...</div>;
          if (userSettings === 'onboarding') return <Onboarding onComplete={handleUpdateSettings} />;

          return (
            <div className="min-h-screen bg-black text-white font-sans overflow-x-hidden">
              <div className="w-full max-w-md mx-auto min-h-screen flex flex-col relative shadow-2xl">
                <CustomDialog dialog={dialog} onClose={() => setDialog(null)} />
                
                <main className="flex-1 overflow-y-auto p-6 pb-40">
                  {activeTab === 'dashboard' && (
                      <div className="animate-in fade-in duration-500">
                        <h1 className="text-3xl font-bold mb-6">Сводка</h1>
                        {userSettings.types?.length > 0 && (
                            <IOSWidget title="Без курения" date={userSettings.quitDate} icon={<Wind />} size={userSettings.widgetSize} theme={TIMER_THEMES.smoking.find(t => t.id === userSettings.timerThemes.smoking)} />
                        )}
                        {userSettings.alcoholEnabled && (
                            <IOSWidget title="Без алкоголя" date={userSettings.alcoholQuitDate} icon={<Coffee />} size={userSettings.widgetSize} theme={TIMER_THEMES.alcohol.find(t => t.id === userSettings.timerThemes.alcohol)} />
                        )}
                        {userSettings.drugsEnabled && (
                            <IOSWidget title="Без веществ" date={userSettings.drugsQuitDate} icon={<Zap />} size={userSettings.widgetSize} theme={TIMER_THEMES.drugs.find(t => t.id === userSettings.timerThemes.drugs)} />
                        )}
                        <button onClick={() => setDialog({ title: 'SOS', message: 'Накат длится всего несколько минут. Попробуй глубоко подышать (4-7-8) или выпей стакан воды.', type: 'alert' })} 
                            className="w-full bg-red-500/20 text-red-500 border border-red-500/30 p-10 rounded-[2.5rem] font-bold text-3xl mt-8 active:scale-95 transition-transform shadow-xl">
                            SOS
                        </button>
                      </div>
                  )}

                  {activeTab === 'statistics' && (
                      <div className="animate-in slide-in-from-bottom-4 duration-500">
                        <h1 className="text-3xl font-bold mb-6">Статистика</h1>
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-white/5 p-6 rounded-3xl border border-white/10 text-center">
                                <span className="text-2xl font-bold text-rose-500">
                                    {(userSettings.relapseHistory?.smoking?.length || 0) + (userSettings.relapseHistory?.alcohol?.length || 0) + (userSettings.relapseHistory?.drugs?.length || 0)}
                                </span>
                                <p className="text-[10px] uppercase opacity-50 font-bold mt-1">Всего срывов</p>
                            </div>
                            <div className="bg-white/5 p-6 rounded-3xl border border-white/10 text-center">
                                <TrendingUp className="mx-auto mb-2 text-blue-500" />
                                <p className="text-[10px] uppercase opacity-50 font-bold">Идешь к цели</p>
                            </div>
                        </div>
                        <h2 className="text-xl font-bold mt-8 mb-4">История срывов</h2>
                        <div className="space-y-3">
                            {[...userSettings.relapseHistory?.smoking, ...userSettings.relapseHistory?.alcohol, ...userSettings.relapseHistory?.drugs]
                                .sort((a,b) => new Date(b.date) - new Date(a.date)).map((r, i) => (
                                <div key={i} className="bg-white/5 p-4 rounded-2xl flex justify-between items-center">
                                    <div>
                                        <div className="text-[10px] opacity-40 font-bold">{new Date(r.date).toLocaleDateString()}</div>
                                        <div className="font-bold">Чистота: {formatDurationFriendly(r.streakSecs)}</div>
                                    </div>
                                    <RotateCcw size={16} className="text-white/20" />
                                </div>
                            ))}
                        </div>
                      </div>
                  )}

                  {activeTab === 'settings' && (
                      <div className="space-y-6 animate-in fade-in duration-500">
                        <h1 className="text-3xl font-bold">Настройки</h1>
                        <div className="bg-white/5 p-6 rounded-[2.5rem] border border-white/10">
                            <div className="flex justify-between items-center mb-6">
                                <span className="font-bold">Компактные виджеты</span>
                                <input type="checkbox" checked={userSettings.widgetSize === 'compact'} onChange={() => handleUpdateSettings({...userSettings, widgetSize: userSettings.widgetSize === 'compact' ? 'large' : 'compact'})} className="w-6 h-6" />
                            </div>
                            <ThemeSelector title="Стиль: Курение" themes={TIMER_THEMES.smoking} selectedId={userSettings.timerThemes.smoking} onSelect={id => handleUpdateSettings({...userSettings, timerThemes: {...userSettings.timerThemes, smoking: id}})} />
                        </div>
                        <div className="space-y-3">
                            <button onClick={() => requestRelapse('smoking')} className="w-full bg-white/5 p-5 rounded-2xl border border-white/10 font-bold text-red-400">Срыв: Курение</button>
                            {userSettings.alcoholEnabled && <button onClick={() => requestRelapse('alcohol')} className="w-full bg-white/5 p-5 rounded-2xl border border-white/10 font-bold text-red-400">Срыв: Алкоголь</button>}
                        </div>
                        <button onClick={() => handleUpdateSettings('onboarding')} className="w-full p-4 text-[10px] opacity-20 uppercase tracking-widest font-bold">Полный сброс (удалить всё)</button>
                      </div>
                  )}
                </main>

                <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm z-40">
                  <div className="bg-white/10 backdrop-blur-3xl rounded-[2.5rem] p-2 flex justify-between border border-white/10 shadow-2xl">
                    {[
                        {id: 'dashboard', icon: Activity},
                        {id: 'statistics', icon: BarChart3},
                        {id: 'settings', icon: SettingsIcon}
                    ].map(t => (
                        <button key={t.id} onClick={() => setActiveTab(t.id)} className={`p-4 rounded-3xl flex-1 flex justify-center transition-all ${activeTab === t.id ? 'bg-white text-black shadow-lg scale-110' : 'text-white/40'}`}>
                            <t.icon />
                        </button>
                    ))}
                  </div>
                </nav>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
